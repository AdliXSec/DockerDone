##############################################
# UI Service (Laravel)
# Command: docker compose up -d --build
# Pastikan docker-compose.infra.yml sudah berjalan
##############################################

services:
  uiservice-app:
    build:
      context: .
    container_name: medtech-uiservice
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=uiservice-db
      - DB_PORT=3306
      - DB_DATABASE=ui_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - USER_SERVICE_URL=http://medtech-userservice:5000
      - ORDER_SERVICE_URL=http://medtech-orderservice:80/api
      - PRODUCT_SERVICE_URL=http://medtech-productservice:80/api
    volumes:
      - .:/var/www
    depends_on:
      uiservice-db:
        condition: service_healthy
    networks:
      - medtech-network
    restart: unless-stopped

  uiservice-db:
    image: mysql:8.0
    container_name: medtech-uiservice-db
    ports:
      - "3310:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ui_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - uiservice_db_data:/var/lib/mysql
    networks:
      - medtech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  medtech-network:
    external: true
    name: medtech-network

volumes:
  uiservice_db_data:
