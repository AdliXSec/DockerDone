"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

type Order {
    id: ID!
    user_id: ID!
    product_id: ID!
    order_code: String!
    customer_name: String!
    customer_email: String!
    quantity: Int!
    total_price: Int!
    status: String!
    created_at: DateTime!
    updated_at: DateTime!
}

type Query {
    orders: [Order!]! @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@all")
    order(id: ID! @eq): Order @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@find")
    ordersByUser(user_id: ID!): [Order!]! @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@findByUser")
}

input CreateOrderInput {
    product_id: ID!
    quantity: Int!
}

input UpdateOrderInput {
    id: ID!
    product_id: ID!
    quantity: Int!
}

type Mutation {
    createOrder(input: CreateOrderInput!): Order! @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@create")
    updateOrder(input: UpdateOrderInput!): Order! @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@update")
    updateOrderStatus(id: ID!, status: String!): Order! @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@updateStatus")
    deleteOrder(id: ID!): Boolean! @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@delete")
}
