# Scalar Types
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

# Types
type Obat {
  id: ID!
  name: String!
  category: String!
  price: Float!
  stock: Int!
  description: String
  created_at: DateTime
  updated_at: DateTime
}

# Query
type Query {
  obats: [Obat!]! @field(resolver: "App\\GraphQL\\Queries\\ObatQueries@all")
  obat(id: ID!): Obat @field(resolver: "App\\GraphQL\\Queries\\ObatQueries@find")
}

# Input Object Type
input CreateObatInput {
  name: String!
  category: String!
  price: Float!
  stock: Int!
  description: String
}

# Input Object Type
input UpdateObatInput {
  id: ID!
  name: String
  category: String
  price: Float
  stock: Int
  description: String
}

# Mutation and Resolver
type Mutation {
  createObat(input: CreateObatInput!): Obat @field(resolver: "App\\GraphQL\\Mutations\\ObatMutations@create") @middleware(checks: ["check.role"])
  updateObat(input: UpdateObatInput!): Obat @field(resolver: "App\\GraphQL\\Mutations\\ObatMutations@update") @middleware(checks: ["check.role"])
  deleteObat(id: ID!): Obat @field(resolver: "App\\GraphQL\\Mutations\\ObatMutations@delete") @middleware(checks: ["check.role"])
}
