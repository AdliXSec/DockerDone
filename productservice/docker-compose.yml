##############################################
# Product Service (Laravel)
# Command: docker compose up -d --build
# Pastikan rabbitmq/docker-compose.yml sudah berjalan
##############################################

services:
  productservice-app:
    build: .
    container_name: medtech-productservice
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=productservice-db
      - DB_PORT=3306
      - DB_DATABASE=products_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - QUEUE_CONNECTION=rabbitmq
      - RABBITMQ_HOST=medtech-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_VHOST=/
      - USER_SERVICE_URL=http://medtech-userservice:5000
    command: >
      sh -c "
        mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache &&
        chown -R www-data:www-data storage bootstrap/cache &&
        chmod -R 775 storage bootstrap/cache &&
        touch storage/logs/laravel.log && chmod 664 storage/logs/laravel.log && chown www-data:www-data storage/logs/laravel.log &&
        php-fpm
      "
    depends_on:
      productservice-db:
        condition: service_healthy
    networks:
      - medtech-network
    restart: unless-stopped

  productservice-nginx:
    image: nginx:stable-alpine
    container_name: medtech-productservice-nginx
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - medtech-network
    depends_on:
      - productservice-app
    restart: unless-stopped

  productservice-db:
    image: mysql:8.0
    container_name: medtech-productservice-db
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=products_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - productservice_db_data:/var/lib/mysql
    networks:
      - medtech-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  medtech-network:
    external: true
    name: medtech-network

volumes:
  productservice_db_data:
